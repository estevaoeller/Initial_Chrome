<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Aba Personalizada</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="background-filter"></div>

    <div id="app-container">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>Spaces</h3>
                <button id="add-space-btn" title="Novo Espaço">+</button>
            </div>
            <nav id="spaces-list">
                <!-- Populado dinamicamente pelo script.js -->
            </nav>
        </aside>

        <!-- Toggle button outside sidebar so it's always visible -->
        <button id="sidebar-toggle" title="Esconder/Mostrar">◀</button>

        <!-- MAIN CONTENT -->
        <div id="main-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; font-size: var(--quick-links-size, 13px);">
                <nav id="quick-links-bar" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 0;"></nav>
                <div id="top-right-bar">
                    <a href="#" id="toggl-toggle-btn" style="text-decoration: none; color: var(--text); opacity: 0.8; font-family: inherit; transition: opacity 0.2s; display: none;">Toggl</a>
                </div>
            </div>
            <header id="top-header">
                <div id="weather-widget" class="weather-widget" style="display: none;" title="Previsão do tempo">
                    <span id="weather-icon">--</span>
                    <span id="weather-temp">--°C</span>
                </div>

                <div id="clock-area" class="modern-clock">
                    <div id="greeting-placeholder" class="greeting-text"></div>
                    <div id="analog-clock-placeholder" class="clock-time"></div>
                    <div id="digital-clock-placeholder" class="digital-time" style="display: none;"></div>
                    <div id="date-container">
                        <div id="date-placeholder" class="clock-date"></div>
                        <div id="calendar-placeholder" class="mini-calendar"></div>
                    </div>
                </div>
            </header>

            <main id="content-area">
            </main>
        </div>

        <!-- RIGHT ACTION SIDEBAR -->
        <aside id="action-sidebar">
            <div class="action-top">
                <!-- Theme Toggle -->
                <button id="theme-toggle-btn" class="action-btn" title="Alternar Tema">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                </button>

                <!-- Bookmarks (Chrome) -->
                <button id="chrome-bookmarks-btn" class="action-btn" title="Bookmarks">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>

                <!-- History (Chrome) -->
                <button id="chrome-history-btn" class="action-btn" title="Histórico">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>

                <!-- Downloads (Chrome) -->
                <button id="chrome-downloads-btn" class="action-btn" title="Downloads">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>

            <div class="action-bottom">
                <!-- Settings -->
                <button id="settings-btn" class="action-btn" title="Configurações">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- POMODORO WIDGET -->
        <div id="pomodoro-widget" class="pomodoro-widget" style="display: none;">
            <div class="pomodoro-header">
                <span class="pomodoro-title">⏱️ Foco</span>
                <span id="pomodoro-mode-badge" class="badge">Trabalho</span>
            </div>
            <div class="pomodoro-timer">
                <span id="pomodoro-time">25:00</span>
            </div>
            <div class="pomodoro-controls">
                <input type="text" id="pomodoro-desc" placeholder="O que fará agora?" class="pomodoro-input" autocomplete="off">
                <select id="pomodoro-project" class="pomodoro-input" style="display: none;">
                    <option value="none">Sem Projeto</option>
                </select>
                <div class="pomodoro-buttons">
                    <button id="pomodoro-play-btn" class="pomo-btn play" title="Iniciar">▶️</button>
                    <button id="pomodoro-stop-btn" class="pomo-btn stop" title="Parar" style="display: none;">⏹️</button>
                </div>
            </div>
        </div>

        <!-- Unsplash Info -->
        <div id="unsplash-info" class="unsplash-info" style="display: none;">
            <a id="unsplash-link" href="#" target="_blank" title="Ver foto no Unsplash">
                <span id="unsplash-location"></span>
                <span id="unsplash-date"></span>
                <span id="unsplash-views"></span>
                <span id="unsplash-user"></span>
            </a>
            <button id="next-wallpaper-btn" title="Próximo Wallpaper (Unsplash)" style="background:transparent; border:none; color:inherit; font-size:16px; cursor:pointer; margin-left: 10px; opacity:0.8; transition: opacity 0.2s;">🔁</button>
        </div>
    </div>



    <!-- Edit Link Modal -->
    <div id="edit-link-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h2>Editar Link</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Live Preview Card -->
                <div class="preview-section">
                    <label>Pré-visualização</label>
                    <div class="preview-card-container">
                        <div id="preview-bookmark-item" class="bookmark-item" style="pointer-events: none;">
                            <img id="preview-favicon" class="bookmark-favicon" src="" alt="">
                            <span id="preview-name" class="bookmark-name">Nome do Link</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-link-name">Nome de Exibição</label>
                    <input type="text" id="edit-link-name" class="modern-input" placeholder="Ex: Uptime Kuma">
                </div>

                <div class="form-group">
                    <label for="edit-link-url">URL de Destino</label>
                    <input type="url" id="edit-link-url" class="modern-input" placeholder="http://192.168.1.10:3001">
                </div>

                <div class="form-group">
                    <label>Ícone Inteligente</label>
                    <div class="icon-tabs">
                        <button class="icon-tab-btn active" data-tab="auto">Automático</button>
                        <button class="icon-tab-btn" data-tab="gallery">Galeria Oficial</button>
                        <button class="icon-tab-btn" data-tab="custom">Link/Upload</button>
                    </div>

                    <!-- Tab: Auto (Favicon) -->
                    <div id="tab-auto" class="icon-tab-content active">
                        <p class="tab-desc">Busca o favicon oficial usando o serviço do Google.</p>
                    </div>

                    <!-- Tab: Unified Gallery -->
                    <div id="tab-gallery" class="icon-tab-content" style="display: none;">
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label for="gallery-source">Fonte do Ícone</label>
                            <select id="gallery-source" class="modern-input" style="padding: 8px;">
                                <option value="simpleicons">SimpleIcons (Logos Coloridos / Flat)</option>
                                <option value="techicons">TechIcons (Linguagens e Ferramentas)</option>
                                <option value="dashboardicons">DashboardIcons (Self-Hosted Apps)</option>
                            </select>
                        </div>

                        <input type="text" id="gallery-search" class="modern-input"
                            placeholder="Buscar... (Ex: github, docker, plex)">

                        <!-- Dynamic settings inside Gallery -->
                        <div id="gallery-settings" style="margin-top: 15px;">
                            <!-- SimpleIcons: Color Picker -->
                            <div id="gallery-simpleicons-settings" class="gallery-dynamic-settings">
                                <label for="edit-icon-color">Cor da Silhueta (SVG)</label>
                                <div class="color-picker-row"
                                    style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                                    <input type="color" id="edit-icon-color" value="#ffffff"
                                        style="cursor:pointer; padding:0; border:none; border-radius:4px; width:30px; height:30px;">
                                    <span id="edit-icon-color-hex" style="font-family:monospace;">#ffffff</span>
                                </div>
                            </div>

                            <!-- TechIcons: Colorized View -->
                            <div id="gallery-techicons-settings" class="gallery-dynamic-settings"
                                style="display: none;">
                                <div style="display: flex; gap: 10px; align-items: center;">
                                    <input type="checkbox" id="techicon-colored" checked>
                                    <label for="techicon-colored" style="margin-bottom:0;">Colorido (Original)</label>
                                </div>
                            </div>

                            <!-- DashboardIcons: Only message/info -->
                            <div id="gallery-dashboardicons-settings" class="gallery-dynamic-settings"
                                style="display: none;">
                                <p style="font-size: 0.8rem; opacity: 0.7; margin: 0;">Ícones desenhados especialmente
                                    para dashboards e home servers.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: Custom -->
                    <div id="tab-custom" class="icon-tab-content" style="display: none;">
                        <p class="tab-desc">Cole o link direto da imagem (.png, .jpg, .svg).</p>
                        <input type="url" id="custom-icon-url" class="modern-input"
                            placeholder="https://exemplo.com/logo.png">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-link-btn" class="modal-btn secondary-btn">Cancelar</button>
                <button id="save-link-btn" class="modal-btn primary-btn">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
</body>

</html>
